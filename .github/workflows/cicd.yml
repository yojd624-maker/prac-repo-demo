name: devops

on: 
  workflow_dispatch:
    inputs:
      environments:
        description: This need to be written so u can choose
        default: "dev"
        required: true
        type: choice
        options:
          - main
          - dev
          - staging
          - feature
          

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: coding
        run: echo "Coding is Done move to build"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "Building is done move to test"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: testing
        run: echo "Testing is done move to final work"

  deploy:
    if: inputs.environment == 'main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deployment
        run: echo "DEPLOYMENT"
