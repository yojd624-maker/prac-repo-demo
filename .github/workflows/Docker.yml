name: docker automation
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DName}}
          password: ${{secrets.DToken}}
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{secrets.DName}}/${{vars.GITHUBREPO}}:${{github.sha}}
